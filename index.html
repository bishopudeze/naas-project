<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#006400" />
    <meta name="description" content="Real-time security alerts for Nigerian communities — CCU Alert CCU Alert" />

    <!-- PWA / Apple -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CCU Alert" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (WhatsApp / Facebook link previews) -->
    <meta property="og:title"       content="CCU Alert — Community Crisis Unit" />
    <meta property="og:description" content="Real-time security alerts for your state and LGA. Stay safe, Nigeria." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:url"         content="https://naas.ng" />
    <meta property="og:type"        content="website" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="CCU Alert — Nigeria Security" />
    <meta name="twitter:description" content="Real-time security alerts for all 36 Nigerian states + FCT." />

    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>CCU Alert — Community Crisis Unit</title>

    <style>
      /* Prevent flash of unstyled content */
      body { margin: 0; background: #006400; }
      #root { min-height: 100vh; }

      /* Prevent iOS Safari auto-zoom on input focus */
      input, select, textarea { font-size: 16px !important; -webkit-text-size-adjust: 100%; }

      /* Smooth tap on buttons */
      button { touch-action: manipulation; }

      /* Tap highlight */
      * { -webkit-tap-highlight-color: rgba(0,100,0,0.1); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
